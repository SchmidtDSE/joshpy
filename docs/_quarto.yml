project:
  type: website
  output-dir: _site
  render:
    # Render in dependency order - some tutorials create data for others
    - index.qmd
    - getting-started/index.qmd
    - getting-started/installation.qmd
    - getting-started/quickstart.qmd
    - tutorials/index.qmd
    - tutorials/manual-workflow.qmd      # Creates demo_registry.duckdb
    - tutorials/sweep-manager.qmd        # Also creates demo_registry.duckdb
    - tutorials/analysis.qmd             # Depends on demo_registry.duckdb
    - tutorials/preprocessing.qmd           # Creates .jshd files
    - tutorials/external-data-sweep.qmd     # Depends on preprocessing output
    - tutorials/timestep-interventions.qmd  # Single-time external data patterns
    - tutorials/adaptive-sweep.qmd
    - tutorials/debug-inspection.qmd     # Debug output inspection
    - tutorials/switching-versions.qmd   # Josh version switching
    - tutorials/remote-execution.qmd     # Josh Cloud execution
    - best-practices.qmd
    - reference/

website:
  title: "joshpy"
  description: "Python client for Josh ecological simulations"
  
  navbar:
    left:
      - text: "Getting Started"
        href: getting-started/index.qmd
      - text: "Tutorials"
        menu:
          - text: "---"
          - text: "Orchestration"
          - text: "Manual Workflow"
            href: tutorials/manual-workflow.qmd
          - text: "SweepManager"
            href: tutorials/sweep-manager.qmd
          - text: "Switching Josh Versions"
            href: tutorials/switching-versions.qmd
          - text: "Remote Runs in Parallel"
            href: tutorials/remote-execution.qmd
          - text: "---"
          - text: "External Data"
          - text: "Preprocessing"
            href: tutorials/preprocessing.qmd
          - text: "External Data Sweeps"
            href: tutorials/external-data-sweep.qmd
          - text: "Timestep Interventions"
            href: tutorials/timestep-interventions.qmd
          - text: "---"
          - text: "Optimization"
          - text: "Adaptive Sweeps"
            href: tutorials/adaptive-sweep.qmd
          - text: "---"
          - text: "Debugging"
          - text: "Debug Output Inspection"
            href: tutorials/debug-inspection.qmd
          - text: "---"
          - text: "Analysis"
          - text: "Analysis & Visualization"
            href: tutorials/analysis.qmd
      - text: "Best Practices"
        href: best-practices.qmd
      - text: "Reference"
        href: reference/index.qmd
    right:
      - icon: github
        href: https://github.com/SchmidtDSE/joshpy
      - icon: box-arrow-up-right
        href: https://joshsim.org
        text: Josh

  sidebar:
    - title: "Getting Started"
      contents:
        - getting-started/index.qmd
        - getting-started/installation.qmd
        - getting-started/quickstart.qmd
    
    - title: "Tutorials"
      contents:
        - tutorials/index.qmd
        - section: "Orchestration"
          contents:
            - tutorials/manual-workflow.qmd
            - tutorials/sweep-manager.qmd
            - tutorials/switching-versions.qmd
            - tutorials/remote-execution.qmd
        - section: "External Data"
          contents:
            - tutorials/preprocessing.qmd
            - tutorials/external-data-sweep.qmd
            - tutorials/timestep-interventions.qmd
        - section: "Optimization"
          contents:
            - tutorials/adaptive-sweep.qmd
        - section: "Debugging"
          contents:
            - tutorials/debug-inspection.qmd
        - section: "Analysis"
          contents:
            - tutorials/analysis.qmd
    
    - title: "Best Practices"
      contents:
        - best-practices.qmd
    
    - title: "API Reference"
      contents:
        - reference/index.qmd
        - section: "CLI"
          contents:
            - reference/cli.JoshCLI.qmd
            - reference/cli.CLIResult.qmd
            - reference/cli.RunConfig.qmd
            - reference/cli.RunRemoteConfig.qmd
            - reference/cli.NetcdfPreprocessConfig.qmd
            - reference/cli.GeotiffPreprocessConfig.qmd
            - reference/cli.CsvPreprocessConfig.qmd
            - reference/cli.ValidateConfig.qmd
        - section: "Jobs"
          contents:
            - reference/jobs.JobConfig.qmd
            - reference/jobs.SweepConfig.qmd
            - reference/jobs.ConfigSweepParameter.qmd
            - reference/jobs.FileSweepParameter.qmd
            - reference/jobs.JobExpander.qmd
            - reference/jobs.JobSet.qmd
            - reference/jobs.ExpandedJob.qmd
            - reference/jobs.run_sweep.qmd
            - reference/jobs.SweepResult.qmd
            - reference/jobs.AdaptiveSweepResult.qmd
        - section: "Strategies"
          contents:
            - reference/strategies.SweepStrategy.qmd
            - reference/strategies.CartesianStrategy.qmd
            - reference/strategies.OptunaStrategy.qmd
            - reference/strategies.strategy_from_dict.qmd
            - reference/strategies.run_adaptive_sweep.qmd
            - reference/strategies.sample_params_from_trial.qmd
        - section: "Registry"
          contents:
            - reference/registry.RunRegistry.qmd
            - reference/registry.RegistryCallback.qmd
            - reference/registry.SessionInfo.qmd
            - reference/registry.ConfigInfo.qmd
            - reference/registry.RunInfo.qmd
            - reference/registry.DataSummary.qmd
        - section: "Data & Diagnostics"
          contents:
            - reference/cell_data.CellDataLoader.qmd
            - reference/cell_data.DiagnosticQueries.qmd
            - reference/diagnostics.SimulationDiagnostics.qmd
        - section: "Sweep Management"
          contents:
            - reference/sweep.SweepManager.qmd
            - reference/sweep.SweepManagerBuilder.qmd
            - reference/sweep.recover_sweep_results.qmd
            - reference/sweep.load_job_results.qmd
            - reference/sweep.LoadConfig.qmd
            - reference/sweep.ResultLoadError.qmd
        - section: "JAR Management"
          contents:
            - reference/jar.JarMode.qmd
            - reference/jar.JarManager.qmd
            - reference/jar.get_jar.qmd

  page-footer:
    center: |
      Built with [Quarto](https://quarto.org) |
      [joshpy](https://github.com/SchmidtDSE/joshpy) is part of the
      [DSE Disturbance Toolbox](https://dse.berkeley.edu)

  search:
    location: navbar
    type: overlay

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap

execute:
  freeze: true

# Quartodoc API reference generation
quartodoc:
  package: joshpy
  title: "API Reference"
  dir: reference
  parser: google
  
  sections:
    - title: CLI Module
      desc: Josh command-line interface wrapper
      contents:
        - cli.JoshCLI
        - cli.CLIResult
        - cli.RunConfig
        - cli.RunRemoteConfig
        - cli.NetcdfPreprocessConfig
        - cli.GeotiffPreprocessConfig
        - cli.CsvPreprocessConfig
        - cli.ValidateConfig
    
    - title: Jobs Module
      desc: Job configuration and parameter sweep execution
      contents:
        - jobs.JobConfig
        - jobs.SweepConfig
        - jobs.ConfigSweepParameter
        - jobs.FileSweepParameter
        - jobs.JobExpander
        - jobs.JobSet
        - jobs.ExpandedJob
        - jobs.run_sweep
        - jobs.SweepResult
        - jobs.AdaptiveSweepResult
    
    - title: Strategies Module
      desc: Sweep expansion strategies for parameter optimization
      contents:
        - strategies.SweepStrategy
        - strategies.CartesianStrategy
        - strategies.OptunaStrategy
        - strategies.strategy_from_dict
        - strategies.run_adaptive_sweep
        - strategies.sample_params_from_trial
    
    - title: Registry Module
      desc: DuckDB-backed experiment tracking
      contents:
        - registry.RunRegistry
        - registry.RegistryCallback
        - registry.SessionInfo
        - registry.ConfigInfo
        - registry.RunInfo
        - registry.DataSummary
    
    - title: Cell Data Module
      desc: Data loading and diagnostic queries
      contents:
        - cell_data.CellDataLoader
        - cell_data.DiagnosticQueries
    
    - title: Diagnostics Module
      desc: Quick visualization for simulation sanity checks
      contents:
        - diagnostics.SimulationDiagnostics
    
    - title: Sweep Module
      desc: High-level sweep orchestration
      contents:
        - sweep.SweepManager
        - sweep.SweepManagerBuilder
        - sweep.recover_sweep_results
        - sweep.load_job_results
        - sweep.LoadConfig
        - sweep.ResultLoadError
    
    - title: JAR Module
      desc: Josh JAR file management
      contents:
        - jar.JarMode
        - jar.JarManager
        - jar.get_jar
