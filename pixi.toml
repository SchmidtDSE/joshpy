[project]
name = "joshpy"
version = "0.0.1"
description = "Python client for Josh ecological simulation runtime"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10"
openjdk = ">=17"
pip = "*"
wget = "*"
gh = ">=2.86.0,<3"
pandas = ">=3.0.0,<4"
ipykernel = ">=7.1.0,<8"
jupyter = ">=1.1.1,<2"
quarto = ">=1.4"
r-base = ">=4.3"
r-knitr = ">=1.45"
r-rmarkdown = ">=2.25"
r-reticulate = ">=1.38"
r-ggplot2 = ">=3.5"
r-dplyr = ">=1.1"
conda = "*"
scipy = ">=1.17.1,<2"
optuna = ">=4.7.0,<5"

[target.linux-64.dependencies]
r-dbi = ">=1.2"
r-duckdb = ">=1.0"
matplotlib = ">=3.10.8,<4"

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=4.0"
mypy = ">=1.0"
ruff = ">=0.1"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
install = "pip install -e '.[full]' --quiet"
install-dev = "pip install -e '.[dev]' --quiet"
test = { cmd = "pytest tests/ -v", depends-on = ["install-dev"] }
lint = "ruff check joshpy/"
typecheck = "mypy joshpy/"
format = "ruff format joshpy/"
get-jars = "bash .devcontainer/scripts/on_build/get_fat_jar.sh"

# Documentation tasks
docs-install = "pip install -e '.[full,docs]' --quiet"
docs-api = { cmd = "python -m quartodoc build --config docs/_quarto.yml", depends-on = ["docs-install"] }
docs-build = { cmd = "bash scripts/render-docs.sh", depends-on = ["docs-install"] }
docs-preview = { cmd = "echo '# cmd: conda' > $CONDA_PREFIX/conda-meta/history && RETICULATE_PYTHON=$CONDA_PREFIX/bin/python quarto preview docs", depends-on = ["docs-build"] }
docs-preview-fast = { cmd = "echo '# cmd: conda' > $CONDA_PREFIX/conda-meta/history && RETICULATE_PYTHON=$CONDA_PREFIX/bin/python quarto preview docs", depends-on = ["docs-api"] }
docs-clean = "rm -rf docs/_site docs/_freeze docs/reference/*.qmd docs/tutorials/demo_registry.duckdb docs/tutorials/external_sweep.duckdb* docs/tutorials/adaptive_demo.duckdb*"
